<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitação de Materiais</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f6f8;
      color: #333;
    }

    .container {
      max-width: 850px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    h1 {
      color: #0B3D91;
      margin-bottom: 10px;
      text-align: center;
    }

    h2 {
      color: #0B3D91;
      margin-top: 20px;
      margin-bottom: 15px;
    }

    p {
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #cccccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 15px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 22px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .tab-button {
      flex: 1;
      min-width: 120px;
      padding: 12px;
      background-color: #e9edf3;
      color: #333;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .tab-button.active {
      background-color: #0B3D91;
      color: #ffffff;
    }

    .tab-content {
      display: none;
      padding: 15px;
      border: 1px solid #dddddd;
      border-radius: 10px;
      background-color: #fafafa;
      margin-bottom: 20px;
    }

    .tab-content.active {
      display: block;
    }

    .material-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 10px;
      background-color: #ffffff;
      border: 1px solid #eeeeee;
      border-radius: 8px;
    }

    .material-item label {
      flex: 1;
      margin-bottom: 0;
    }

    .material-item input {
      width: 90px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button.action-button {
      background-color: #0B3D91;
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    button.action-button:hover {
      background-color: #082f70;
    }

    button.action-button:disabled {
      background-color: #aaaaaa;
      cursor: not-allowed;
    }

    #summary {
      margin-top: 22px;
      padding: 18px;
      background-color: #f1f5fb;
      border: 1px solid #cfd8e3;
      border-radius: 10px;
      display: none;
    }

    #summary p {
      margin: 6px 0;
    }

    #summary ul {
      padding-left: 22px;
    }

    footer {
      margin-top: 35px;
      text-align: center;
      font-size: 13px;
      color: #666666;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 18px;
      }

      .material-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .material-item input {
        width: 100%;
      }

      .tab-button {
        flex: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Solicitação de Materiais</h1>

    <p>
      Preencha os campos abaixo, selecione as quantidades dos materiais desejados e gere sua solicitação.
      Depois, envie a listagem diretamente pelo WhatsApp.
    </p>

    <div class="form-group">
      <label for="instrutor">Nome do Instrutor</label>
      <input type="text" id="instrutor" placeholder="Digite o nome do instrutor">
    </div>

    <div class="form-group">
      <label for="treinamento">Treinamento/Curso</label>
      <input type="text" id="treinamento" placeholder="Ex.: APH, PCI, NR-35, Brigada de Incêndio">
    </div>

    <div class="form-group">
      <label for="empresa">Empresa</label>
      <input type="text" id="empresa" placeholder="Digite o nome da empresa">
    </div>

    <div class="form-group">
      <label for="data">Data</label>
      <input type="date" id="data">
    </div>

    <div class="tabs">
      <button type="button" class="tab-button active" data-target="aph">APH</button>
      <button type="button" class="tab-button" data-target="pci">PCI</button>
      <button type="button" class="tab-button" data-target="pp">PP</button>
      <button type="button" class="tab-button" data-target="vertical">VERTICAL</button>
    </div>

    <div id="tab-aph" class="tab-content active">
      <h2>Materiais APH</h2>

      <div class="material-item">
        <label for="bolsaTrauma">Bolsa de Trauma</label>
        <input type="number" id="bolsaTrauma" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="talas">Talas</label>
        <input type="number" id="talas" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="maca">Maca</label>
        <input type="number" id="maca" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="colarCervical">Colar Cervical</label>
        <input type="number" id="colarCervical" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="bonecosRCP">Bonecos RCP</label>
        <input type="number" id="bonecosRCP" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="mochilasOVACE">Mochilas OVACE</label>
        <input type="number" id="mochilasOVACE" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="bonecas">Bonecas</label>
        <input type="number" id="bonecas" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="bolsaSinaisVitais">Bolsa Sinais Vitais</label>
        <input type="number" id="bolsaSinaisVitais" min="0" value="0">
      </div>
    </div>

    <div id="tab-pci" class="tab-content">
      <h2>Materiais PCI</h2>

      <div class="material-item">
        <label for="esguicho">Esguicho</label>
        <input type="number" id="esguicho" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="reducao">Redução</label>
        <input type="number" id="reducao" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="divisor">Divisor</label>
        <input type="number" id="divisor" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="epi">EPI</label>
        <input type="number" id="epi" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="epr">EPR</label>
        <input type="number" id="epr" min="0" value="0">
      </div>
    </div>

    <div id="tab-pp" class="tab-content">
      <h2>Materiais PP</h2>

      <div class="material-item">
        <label for="rotulosRisco">Rótulos de Risco</label>
        <input type="number" id="rotulosRisco" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="painelSeguranca">Painel de Segurança</label>
        <input type="number" id="painelSeguranca" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="manualAbiquim">Manual Abiquim</label>
        <input type="number" id="manualAbiquim" min="0" value="0">
      </div>
    </div>

    <div id="tab-vertical" class="tab-content">
      <h2>Materiais VERTICAL</h2>

      <div class="material-item">
        <label for="cordas">Cordas</label>
        <input type="number" id="cordas" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="ferragens">Ferragens</label>
        <input type="number" id="ferragens" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="macaSked">Maca Sked</label>
        <input type="number" id="macaSked" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="macaMamute">Maca Mamute</label>
        <input type="number" id="macaMamute" min="0" value="0">
      </div>

      <div class="material-item">
        <label for="tripe">Tripe</label>
        <input type="number" id="tripe" min="0" value="0">
      </div>
    </div>

    <div class="actions">
      <button type="button" class="action-button" id="gerar">Gerar Solicitação</button>
      <button type="button" class="action-button" id="enviar" disabled>Enviar no WhatsApp</button>
    </div>

    <div id="summary"></div>

    <footer>
      Sistema de solicitação de materiais.
    </footer>
  </div>

  <script>
    const materiais = [
      { id: 'bolsaTrauma', nome: 'Bolsa de Trauma' },
      { id: 'talas', nome: 'Talas' },
      { id: 'maca', nome: 'Maca' },
      { id: 'colarCervical', nome: 'Colar Cervical' },
      { id: 'bonecosRCP', nome: 'Bonecos RCP' },
      { id: 'mochilasOVACE', nome: 'Mochilas OVACE' },
      { id: 'bonecas', nome: 'Bonecas' },
      { id: 'bolsaSinaisVitais', nome: 'Bolsa Sinais Vitais' },

      { id: 'esguicho', nome: 'Esguicho' },
      { id: 'reducao', nome: 'Redução' },
      { id: 'divisor', nome: 'Divisor' },
      { id: 'epi', nome: 'EPI' },
      { id: 'epr', nome: 'EPR' },

      { id: 'rotulosRisco', nome: 'Rótulos de Risco' },
      { id: 'painelSeguranca', nome: 'Painel de Segurança' },
      { id: 'manualAbiquim', nome: 'Manual Abiquim' },

      { id: 'cordas', nome: 'Cordas' },
      { id: 'ferragens', nome: 'Ferragens' },
      { id: 'macaSked', nome: 'Maca Sked' },
      { id: 'macaMamute', nome: 'Maca Mamute' },
      { id: 'tripe', nome: 'Tripe' }
    ];

    const tabButtons = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(function(botao) {
      botao.addEventListener('click', function() {
        tabButtons.forEach(function(item) {
          item.classList.remove('active');
        });

        tabContents.forEach(function(conteudo) {
          conteudo.classList.remove('active');
        });

        botao.classList.add('active');

        const alvo = botao.getAttribute('data-target');
        const abaSelecionada = document.getElementById('tab-' + alvo);

        if (abaSelecionada) {
          abaSelecionada.classList.add('active');
        }
      });
    });

    const btnGerar = document.getElementById('gerar');
    const btnEnviar = document.getElementById('enviar');
    const summaryDiv = document.getElementById('summary');

    let mensagemWhatsapp = '';

    btnGerar.addEventListener('click', function() {
      const instrutor = document.getElementById('instrutor').value.trim();
      const treinamento = document.getElementById('treinamento').value.trim();
      const empresa = document.getElementById('empresa').value.trim();
      const data = document.getElementById('data').value;

      if (!instrutor || !treinamento || !empresa || !data) {
        alert('Por favor, preencha o nome do instrutor, treinamento/curso, empresa e data.');
        return;
      }

      const materiaisSelecionados = [];

      materiais.forEach(function(item) {
        const campo = document.getElementById(item.id);
        const quantidade = parseInt(campo.value, 10) || 0;

        if (quantidade > 0) {
          materiaisSelecionados.push({
            nome: item.nome,
            quantidade: quantidade
          });
        }
      });

      if (materiaisSelecionados.length === 0) {
        alert('Selecione pelo menos um material com quantidade maior que zero.');
        return;
      }

      const dataFormatada = formatarData(data);

      let resumoHtml = '';
      resumoHtml += '<p><strong>Instrutor:</strong> ' + instrutor + '</p>';
      resumoHtml += '<p><strong>Treinamento/Curso:</strong> ' + treinamento + '</p>';
      resumoHtml += '<p><strong>Empresa:</strong> ' + empresa + '</p>';
      resumoHtml += '<p><strong>Data:</strong> ' + dataFormatada + '</p>';
      resumoHtml += '<p><strong>Materiais solicitados:</strong></p>';
      resumoHtml += '<ul>';

      materiaisSelecionados.forEach(function(item) {
        resumoHtml += '<li>' + item.nome + ': ' + item.quantidade + '</li>';
      });

      resumoHtml += '</ul>';

      summaryDiv.innerHTML = resumoHtml;
      summaryDiv.style.display = 'block';

      let mensagem = '';
      mensagem += 'Solicitação de Materiais\n\n';
      mensagem += 'Instrutor: ' + instrutor + '\n';
      mensagem += 'Treinamento/Curso: ' + treinamento + '\n';
      mensagem += 'Empresa: ' + empresa + '\n';
      mensagem += 'Data: ' + dataFormatada + '\n\n';
      mensagem += 'Materiais solicitados:\n';

      materiaisSelecionados.forEach(function(item) {
        mensagem += '• ' + item.nome + ': ' + item.quantidade + '\n';
      });

      mensagemWhatsapp = mensagem;
      btnEnviar.disabled = false;
    });

    btnEnviar.addEventListener('click', function() {
      if (!mensagemWhatsapp) {
        alert('Primeiro gere a solicitação.');
        return;
      }

      const numeroResponsavel = '5547992894756';
      const url = 'https://wa.me/' + numeroResponsavel + '?text=' + encodeURIComponent(mensagemWhatsapp);

      window.open(url, '_blank');
    });

    function formatarData(data) {
      const partes = data.split('-');

      if (partes.length !== 3) {
        return data;
      }

      return partes[2] + '/' + partes[1] + '/' + partes[0];
    }
  </script>
</body>
</html>
